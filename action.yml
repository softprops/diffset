# https://docs.github.com/en/actions/sharing-automations/creating-actions/metadata-syntax-for-github-actions
name: "diff-set"
description: "Github Action for producing lists of files that changed between branches"
author: "softprops"
runs:
  using: "node24"
  main: "dist/index.js"
inputs:
  token:
    description: 'GitHub access token'
    required: false
    default: ${{ github.token }}
  base:
    description: "Base branch to compare with (defaults to the repository default branch)"
  include_removed:
    description: "Include removed files in diff outputs"
    required: false
    default: "false"
outputs:
  files:
    description: "Space-delimited list of changed files"
branding:
  color: "green"
  icon: "activity"
