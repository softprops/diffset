name: main

on:
  push:
    branches:
      - master
    tags:
      - "**"
  pull_request:
    branches:
      - master

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v5
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v4
        with:
          node-version-file: ".tool-versions"
          package-manager-cache: false

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Test
        run: npm run test

      - name: Format
        run: npm run fmtcheck

      - name: Actionlint
        shell: bash
        run: |
          set -euo pipefail

          version="1.7.12"
          archive="actionlint_${version}_linux_amd64.tar.gz"
          expected_sha="8aca8db96f1b94770f1b0d72b6dddcb1ebb8123cb3712530b08cc387b349a3d8"
          tmpdir="$(mktemp -d)"

          trap 'rm -rf "${tmpdir}"' EXIT
          curl -fsSL "https://github.com/rhysd/actionlint/releases/download/v${version}/${archive}" \
            -o "${tmpdir}/${archive}"
          printf '%s  %s\n' "${expected_sha}" "${tmpdir}/${archive}" | sha256sum -c -
          tar -xzf "${tmpdir}/${archive}" -C "${tmpdir}" actionlint
          "${tmpdir}/actionlint" -color=false

      - name: Check generated files
        run: |
          git diff --exit-code --stat -- . ':!node_modules' \
          || (echo "##[error] found changed files after build. please 'npm run build && npm run fmt'" \
                  "and check in all changes" \
              && exit 1)
  integration:
    needs: build
    permissions:
      contents: read
      pull-requests: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v5
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v4
        with:
          node-version-file: ".tool-versions"
          package-manager-cache: false

      - name: Diffset
        id: diffset
        uses: ./ # Uses an action in the root directory
        env:
          INPUT_MD_FILES: "*.md"

      - name: Print Diffset
        env:
          DIFFSET_FILES: ${{ steps.diffset.outputs.files }}
        shell: bash
        run: |
          read -r -a diffset_files <<< "${DIFFSET_FILES}"
          ls -al "${diffset_files[@]}"

      - name: Print MD Files
        env:
          DIFFSET_OUTPUTS: ${{ toJSON(steps.diffset.outputs) }}
        shell: bash
        run: |
          md_files="$(jq -r '.md_files // empty' <<< "${DIFFSET_OUTPUTS}")"
          if [ -n "${md_files}" ]; then
            echo "Files changed were ${md_files}"
          fi

      - name: Print Rust Files
        env:
          DIFFSET_OUTPUTS: ${{ toJSON(steps.diffset.outputs) }}
        shell: bash
        run: |
          rust_files="$(jq -r '.rust_files // empty' <<< "${DIFFSET_OUTPUTS}")"
          if [ -n "${rust_files}" ]; then
            echo "Files changed were ${rust_files}"
          fi
